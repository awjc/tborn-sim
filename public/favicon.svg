<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sky background -->
  <rect width="32" height="32" rx="4" fill="#87CEEB"/>

  <!-- Ground tile — isometric diamond -->
  <!-- top face -->
  <polygon points="16,5 28,11 16,17 4,11" fill="#4a7c3f"/>
  <!-- left face -->
  <polygon points="4,11 16,17 16,25 4,19" fill="#3a6030"/>
  <!-- right face -->
  <polygon points="28,11 16,17 16,25 28,19" fill="#3d6b35"/>

  <!-- Red cube (left) -->
  <!-- top -->
  <polygon points="8,10 12,8 16,10 12,12" fill="#e74c3c"/>
  <!-- left -->
  <polygon points="8,10 12,12 12,16 8,14" fill="#922b21"/>
  <!-- right -->
  <polygon points="12,12 16,10 16,14 12,16" fill="#c0392b"/>

  <!-- Blue cube (right) -->
  <!-- top -->
  <polygon points="16,10 20,8 24,10 20,12" fill="#3498db"/>
  <!-- left -->
  <polygon points="16,10 20,12 20,16 16,14" fill="#1a6090"/>
  <!-- right -->
  <polygon points="20,12 24,10 24,14 20,16" fill="#2980b9"/>

  <!-- Yellow food tile (front centre) -->
  <!-- top -->
  <polygon points="12,18 15,16.5 18,18 15,19.5" fill="#f0c040"/>
  <!-- left -->
  <polygon points="12,18 15,19.5 15,22 12,20.5" fill="#b8860b"/>
  <!-- right -->
  <polygon points="15,19.5 18,18 18,20.5 15,22" fill="#d4a017"/>
</svg>
